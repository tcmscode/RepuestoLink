name: Demo Gate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apppesados
          POSTGRES_PASSWORD: apppesados
          POSTGRES_DB: apppesados
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://apppesados:apppesados@localhost:5432/apppesados?schema=public
      AUTH_SECRET: ci-test-auth-secret-minimum-32-characters
      NEXTAUTH_URL: http://localhost:3000
      CRON_SECRET: ci-test-cron-secret
      AFIP_MOCK: "true"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run db:push

      - run: npm run db:seed

      - run: npm run test:unit

      - run: npm run test:integration

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
