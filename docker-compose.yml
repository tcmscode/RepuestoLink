# Base de datos local (misma que usa Railway en producción)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: apppesados
      POSTGRES_PASSWORD: apppesados
      POSTGRES_DB: apppesados
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
